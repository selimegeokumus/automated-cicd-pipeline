name: CI/CD Automated Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Run HTML Syntax Check
      run: |
        echo "Running automated integration tests..."
        grep -q "Automated Pipeline Success!" index.html
        echo "Tests passed successfully!"

    - name: Build Virtual Container Environment
      run: |
        echo "Simulating Docker build process..."
        echo "Container image successfully built and validated."
